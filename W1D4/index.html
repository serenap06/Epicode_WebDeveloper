<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Fake Amazon</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>
    <header>
        <div class="containerLogo">
            <img class="headerLogo" src="./assets/logo.png" alt="Logo Amazon">
        </div>
        <div>
            <nav class="navbar">
                <ul class="navbarList">
                    <li class="navbarListContent">All</li>
                    <li class="navbarListContent">Today's deals</li>
                    <li class="navbarListContent">Customer Service</li>
                    <li class="navbarListContent">Registry</li>
                    <li class="navbarListContent">Gift Cards</li>
                    <li class="navbarListContent">Sell</li>
                </ul>
            </nav>
        </div>
    </header>
    <main>
        <section>
            <div class="bannerGiftCards">
                <p class="bannerGiftCardsText">Shop All Holiday Gift Cards</p>
            </div>
            <div class="bannerGiftGuide">
                <img class="bannerGiftGuideImage" src="./assets/bg-image.png" alt="Sfondo verde con regali">
                <h1>Holiday Gift Guide</h1>
                <p class="bannerGiftGuideSubtitle">Be a go-gifter</p>
            </div>
        </section>
        <section class="section1">
            <h2 class="titleSections">Find the perfect gift <span class="blueTitle">Shop now</span></h2>
            <div class="section1img">
                <img class="img" src="./assets/img_1.jpg" alt="immagine kindle">
                <img class="img" src="./assets/img_2.jpg" alt="immagine computer">
                <img class="img" src="./assets/img_3.jpg" alt="immagine orologi">
                <img class="img" src="./assets/img_4.jpg" alt="immagine animali">
            </div>
        </section>
        <section class="section2">
            <img class="imgSection2" src="./assets/img_9.png" alt="immagine visore">
            <h4 class="bottomTitleSections">Play the gifting game <span class="blueTitle">Shop gaming</span></h4>
        </section>
        <div class="section2">
            <img class="imgSection2" src="assets/img_10.png" alt="immagine cuffie">
            <h4 class="bottomTitleSections">The sound of cheer <span class="blueTitle">Shop Audio & Accessories</span>
            </h4>
        </div>
    </main>
    <footer>
        <div class="topContainer">
            <a href=".###">Back to top</a>
        </div>
        <div class="bottomLogoContainer">
            <img class="bottomLogo" src="./assets/logo.png" alt="logo Amazon">
        </div>
    </footer>
</body>

</html>
